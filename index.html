<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marthand | Creator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== LOADING SCREEN ===== */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.bar {
  width: 200px;
  height: 5px;
  background: #222;
  margin-top: 10px;
}

.progress {
  height: 100%;
  width: 0%;
  background: #00ffcc;
  animation: load 2s linear forwards;
}

@keyframes load {
  to { width: 100%; }
}

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
  scroll-behavior: smooth;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-thumb {
  background: #00ffcc;
  border-radius: 10px;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
}

nav h2 {
  color: #00ffcc;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #00ffcc;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
  text-shadow: 0 0 20px #00ffcc;
}

.hero span {
  color: #00ffcc;
}

.btn {
  margin-top: 20px;
  padding: 10px 25px;
  background: #00ffcc;
  color: black;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  box-shadow: 0 0 20px #00ffcc;
}

/* ===== SECTION ===== */
.section {
  padding: 80px 20px;
  text-align: center;
}

.card {
  background: #111;
  margin: 20px;
  padding: 20px;
  display: inline-block;
  border-radius: 10px
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px #00ffcc;
}

/* ===== FOOTER ===== */
footer {
  padding: 20px;
  text-align: center;
  background: #000;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h2>Loading...</h2>
  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<!-- NAVBAR -->
<nav>
  <h2>Marthand</h2>
  <div>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>I am <span id="typing"></span></h1>
  <p>Editor | Animator | Minecraft Developer</p>
  <button class="btn">Hire Me</button>
</div>

<!-- SERVICES -->
<div class="section" id="services">
  <h2>My Services</h2>

  <div class="card">
    <i class="fa-solid fa-video"></i>
    <h3>Video Editing</h3>
  </div>

  <div class="card">
    <i class="fa-solid fa-gamepad"></i>
    <h3>Minecraft Setup</h3>
  </div>

  <div class="card">
    <i class="fa-solid fa-image"></i>
    <h3>Thumbnail Design</h3>
  </div>

</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Contact Me</h2>
  <p>DM me on Instagram or WhatsApp</p>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Marthand</p>
</footer>

<script>

/* LOADER */
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

/* TYPING EFFECT */
let text = ["Marthand", "Editor", "Animator", "Developer"];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;

function type() {
  current = text[i];
  
  if (!isDeleting) {
    document.getElementById("typing").innerHTML = current.substring(0, j++);
    if (j > current.length) {
      isDeleting = true;
      setTimeout(type, 1000);
      return;
    }
  } else {
    document.getElementById("typing").innerHTML = current.substring(0, j--);
    if (j == 0) {
      isDeleting = false;
      i = (i + 1) % text.length;
    }
  }
  setTimeout(type, isDeleting ? 50 : 100);
}

type();

</script>

</body>
</html>
