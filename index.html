<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG CRAZY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* LOADER CINEMATIC */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
flex-direction:column;
animation:fadeOut 2s 3s forwards;
}

#loader h1{
font-size:40px;
letter-spacing:5px;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
animation:zoomIn 2s ease;
}

#loader p{
margin-top:10px;
opacity:0.6;
}

@keyframes zoomIn{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;pointer-events:none;}
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
transition:0.3s;
}

nav.shrink{
height:55px;
background:rgba(0,0,0,0.9);
}

nav h2{
color:#00ffcc;
letter-spacing:2px;
}

.nav-links{
display:flex;
}

.nav-links a{
color:white;
margin:0 15px;
text-decoration:none;
transition:0.3s;
}

.nav-links a:hover{
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

.menu-toggle{display:none;cursor:pointer;}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding-top:70px;
}

.hero h1{
font-size:clamp(30px,6vw,65px);
}

.hero span{
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
}

.btn{
margin-top:20px;
padding:12px 30px;
background:linear-gradient(45deg,#00ffcc,#00ccff);
border-radius:30px;
color:black;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #00ffcc;
}

/* SECTIONS */
.section{
padding:80px 20px;
text-align:center;
scroll-margin-top:80px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,204,0.2);
padding:25px;
margin:15px;
display:inline-block;
border-radius:15px;
width:260px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 40px #00ffcc;
}

/* MOBILE */
@media(max-width:768px){
nav{
padding:0 20px;
}

.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:70px;
right:0;
background:black;
width:200px;
padding:10px;
}

.nav-links.active{
display:flex;
}

.menu-toggle{
display:block;
}
}

/* FOOTER */
#footer{
text-align:center;
padding:20px;
color:#00ffcc;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>BG CRAZY ⚡</h1>
<p>Loading Experience...</p>
</div>

<!-- NAV -->
<nav id="navbar">
<h2>BG CRAZY</h2>
<i class="fa fa-bars menu-toggle" onclick="toggleMenu()"></i>
<div class="nav-links" id="navLinks">
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#portfolio">Work</a>
<a href="#team">Team</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>I am <span id="typing"></span></h1>
<p>Editor • Animator • SMP Developer</p>
<a href="#team" class="btn">JOIN TEAM 🚀</a>
</div>

<!-- SERVICES -->
<div class="section" id="services">
<h2>Services</h2>
<div class="card"><i class="fa fa-video"></i><h3>Editing</h3></div>
<div class="card"><i class="fa fa-gamepad"></i><h3>Minecraft</h3></div>
<div class="card"><i class="fa fa-image"></i><h3>Design</h3></div>
</div>

<!-- PORTFOLIO -->
<div class="section" id="portfolio">
<h2>My Work</h2>
<div class="card">
<iframe width="100%" height="150"
src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
allowfullscreen></iframe>
</div>
</div>

<!-- TEAM -->
<div class="section" id="team">
<h2>Team</h2>
<div class="card"><h3>JASWANTH</h3><p>Co-Owner</p></div>
<div class="card"><h3>RAGHUVEER</h3><p>Manager</p></div>
<div class="card"><h3>CHANDAN</h3><p>ADMIN</p></div>
<div class="card"><h3>PRAKASH</h3><p>MODERATOR</p></div>
<div class="card"><h3>SYAM</h3><p>MODERATOR</p></div>
</div>

<footer id="footer">
© 2026 BG CRAZY
</footer>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

/* TYPING */
let text=["Marthand","Animator","Developer","Editor"];
let i=0,j=0,del=false;

function type(){
let t=text[i];
document.getElementById("typing").innerHTML=t.substring(0,j);

if(!del && j===t.length){
del=true;
setTimeout(type,1200);
return;
}
if(del && j===0){
del=false;
i=(i+1)%text.length;
}

j+=del?-1:1;
setTimeout(type,del?50:100);
}
type();

/* NAVBAR SHRINK */
window.addEventListener("scroll",()=>{
let nav=document.getElementById("navbar");
if(window.scrollY>50){
nav.classList.add("shrink");
}else{
nav.classList.remove("shrink");
}
});

</script>

</body>
</html>
